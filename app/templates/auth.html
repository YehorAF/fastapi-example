<body class="bg-light">
    <main id="app-main" class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="form-group card p-4 shadow-sm w-100 auth-card-max">
            <div class="btn-group mb-4" role="group">
                <button id="go-to-sign" class="btn btn-outline-primary">Sign</button>
                <button id="go-to-auth" class="btn btn-outline-primary">Auth</button>
            </div>
            
            <div id="sign-form" class="auth-forms">
                <h2 class="h4 text-center mb-3">Create account</h2>
                <input id="sign-email" class="sign-input form-control mb-3" type="email" placeholder="Email" required>
                <input id="sign-username" class="sign-input form-control mb-3" type="text" placeholder="Username" required>
                <input id="sign-password" class="sign-input form-control mb-3" type="password" minlength="8" maxlength="32"
                    placeholder="Password" required>
                <input id="sign-password-confirm" class="sign-input form-control mb-4" type="password" minlength="8" maxlength="32"
                    placeholder="Confirm password" required>
                <div class="btn-container d-flex justify-content-between gap-2">
                    <button class="btn btn-secondary flex-grow-1" type="reset">Clear</button>
                    <button id="sign-btn" class="btn btn-primary flex-grow-1">Sign</button>
                </div>
            </div>
            
            <div id="auth-form" class="auth-forms" hidden>
                <h2 class="h4 text-center mb-3">Authorize</h2>
                <input id="auth-email" class="auth-input form-control mb-3" type="email" placeholder="Email" required>
                <input id="auth-password" class="auth-input form-control mb-4" type="password" placeholder="Password" required>
                <div class="btn-container d-flex justify-content-between gap-2">
                    <button class="btn btn-secondary flex-grow-1" type="reset">Clear</button>
                    <button id="auth-btn" class="btn btn-primary flex-grow-1">Auth</button>
                </div>
            </div>
            
            <div id="log-message" class="mt-3" hidden>
                <div id="alert-message" class="alert alert-info mb-2"></div>
                <button id="close-alert" class="btn btn-sm btn-link d-block mx-auto text-decoration-none">Close</button>
            </div>
        </div>
    </main>
</body>

</html>
